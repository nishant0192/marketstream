spring:
  application:
    name: market-consumer

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/marketstream}
    username: ${POSTGRES_USER:marketstream}
    password: ${POSTGRES_PASSWORD:marketstream}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: market-consumer-group
      auto-offset-reset: latest
      enable-auto-commit: false

logging:
  level:
    root: INFO
    com.marketstream: DEBUG
    org.hibernate.SQL: WARN
