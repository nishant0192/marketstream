# docker-compose.yml — MarketStream

services:
  # ── Zookeeper ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: marketstream-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | (exec 3<>/dev/tcp/localhost/2181; cat >&3; timeout 3 cat <&3) 2>/dev/null | grep -q Mode"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks: [marketstream]

  # ── Kafka ──────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: marketstream-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 6000
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 6000
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_SEGMENT_BYTES: 67108864
    restart: on-failure
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks: [marketstream]

  # ── Kafka topic initializer (runs once and exits) ──────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    container_name: marketstream-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic market.stocks --partitions 12 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic market.forex --partitions 6 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic market.crypto --partitions 6 --replication-factor 1 &&
        kafka-configs --bootstrap-server kafka:29092 --alter \
          --entity-type topics --entity-name market.stocks \
          --add-config retention.ms=3600000 &&
        kafka-configs --bootstrap-server kafka:29092 --alter \
          --entity-type topics --entity-name market.forex \
          --add-config retention.ms=3600000 &&
        kafka-configs --bootstrap-server kafka:29092 --alter \
          --entity-type topics --entity-name market.crypto \
          --add-config retention.ms=3600000 &&
        echo "All topics created and configured successfully" &&
        kafka-topics --bootstrap-server kafka:29092 --list
    networks: [marketstream]

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: marketstream-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: marketstream
      POSTGRES_USER: marketstream
      POSTGRES_PASSWORD: marketstream
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketstream -d marketstream"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [marketstream]

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: marketstream-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [marketstream]

  # ── Market Producer ────────────────────────────────────────
  market-producer:
    build:
      context: .
      dockerfile: market-producer/Dockerfile
    container_name: marketstream-producer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PRODUCER_THREADS: 4
      PRODUCER_ENABLED: "true"
    networks: [marketstream]
    restart: on-failure

  # ── Market Consumer ────────────────────────────────────────
  market-consumer:
    build:
      context: .
      dockerfile: market-consumer/Dockerfile
    container_name: marketstream-consumer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_URL: jdbc:postgresql://postgres:5432/marketstream
      POSTGRES_USER: marketstream
      POSTGRES_PASSWORD: marketstream
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks: [marketstream]
    restart: on-failure

  # ── Market API ─────────────────────────────────────────────
  market-api:
    build:
      context: .
      dockerfile: market-api/Dockerfile
    container_name: marketstream-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/marketstream
      POSTGRES_USER: marketstream
      POSTGRES_PASSWORD: marketstream
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
    networks: [marketstream]
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:

networks:
  marketstream:
    driver: bridge
