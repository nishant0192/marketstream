name: MarketStream CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ── Job 1: Build + Unit Tests ─────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Build and run all unit tests
        # All tests are pure Mockito unit tests — no Spring context, no Postgres, no Redis needed
        run: ./mvnw verify -q

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            market-common/target/surefire-reports/
            market-producer/target/surefire-reports/
            market-consumer/target/surefire-reports/
            market-api/target/surefire-reports/
          retention-days: 7

  # ── Job 2: Verify Docker builds (main branch only) ───────────
  build-images:
    name: Verify Docker Builds
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build producer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: market-producer/Dockerfile
          push: false
          tags: marketstream/market-producer:${{ github.sha }}

      - name: Build consumer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: market-consumer/Dockerfile
          push: false
          tags: marketstream/market-consumer:${{ github.sha }}

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: market-api/Dockerfile
          push: false
          tags: marketstream/market-api:${{ github.sha }}
